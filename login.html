<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sheba Enterprise</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans+Bengali:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    .bismillah{
      font-family: "Amiri", serif;
      font-size: clamp(28px, 5.8vw, 42px);
      font-weight: 700;
      line-height: 1.7;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: .5px;
      background: linear-gradient(
        180deg,
        #fffbe8 0%,
        #f8e7a3 28%,
        #f3d46b 52%,
        #d7a93a 78%,
        #9c6a16 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 0 10px rgba(243, 212, 107, 0.18),
        0 0 22px rgba(215, 169, 58, 0.12),
        0 2px 10px rgba(0, 0, 0, 0.28);
      filter: drop-shadow(0 0 10px rgba(243, 212, 107, 0.12));
      animation: bismillahGlow 3s ease-in-out infinite;
    }

    @keyframes bismillahGlow{
      0%,100%{
        transform: translateY(0);
        filter: drop-shadow(0 0 8px rgba(243, 212, 107, 0.10));
      }
      50%{
        transform: translateY(-1px);
        filter: drop-shadow(0 0 14px rgba(243, 212, 107, 0.18));
      }
    }
  </style>
</head>
<body class="login-body">

  <div class="container">
    <p class="bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</p>
    <h1>Sheba Enterprise</h1>

    <div class="login-box premium-login-box">

      <!-- LOGIN -->
      <div id="loginForm" class="form-panel active-form">
        <h2>Login</h2>

        <div class="input-box">
          <i class="fa fa-user"></i>
          <input type="email" id="loginUser" placeholder="Email" />
        </div>

        <div class="input-box">
          <i class="fa fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Password" />
          <i class="fa fa-eye" onclick="togglePassword()"></i>
        </div>

        <button class="login-btn" type="button" onclick="loginUser()">Login করুন</button>
        <button class="signup-btn" type="button" onclick="showSignup()">নতুন অ্যাকাউন্ট তৈরি করুন</button>

        <p class="forgot" onclick="forgotPasswordInfo()">পাসওয়ার্ড ভুলে গেছেন?</p>

        <div id="recentAccounts"></div>
      </div>

      <!-- SIGNUP -->
      <div id="signupForm" class="form-panel">
        <h2>Sign Up</h2>

        <div class="input-box">
          <i class="fa fa-user"></i>
          <input type="text" id="firstname" placeholder="First Name" />
        </div>

        <div class="input-box">
          <i class="fa fa-user"></i>
          <input type="text" id="lastname" placeholder="Last Name" />
        </div>

        <div class="input-box">
          <i class="fa fa-envelope"></i>
          <input type="email" id="email" placeholder="Email" />
        </div>

        <div class="input-box">
          <i class="fa fa-user-circle"></i>
          <input type="text" id="username" placeholder="Username" />
        </div>

        <div class="input-box">
          <i class="fa fa-lock"></i>
          <input type="password" id="signupPassword" placeholder="Password" />
          <i class="fa fa-eye" onclick="toggleSignupPassword()"></i>
        </div>

        <button class="login-btn" type="button" onclick="signupUser()">অ্যাকাউন্ট তৈরি করুন</button>
        <p class="forgot" onclick="showLogin()">আগে থেকেই অ্যাকাউন্ট আছে? Login করুন</p>
      </div>

    </div>
  </div>

  <script src="js/theme.js"></script>

  <script type="module">
    import {
      signUpUser,
      signInUser,
      signOutUser,
      getCurrentUser
    } from "./js/supabase-auth.js";

    function emailValid(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getProfiles() {
      try {
        return JSON.parse(localStorage.getItem("signupProfiles") || "{}");
      } catch {
        return {};
      }
    }

    function saveProfile(email, profile) {
      const profiles = getProfiles();
      profiles[(email || "").toLowerCase()] = profile;
      localStorage.setItem("signupProfiles", JSON.stringify(profiles));
    }

    function getProfile(email) {
      const profiles = getProfiles();
      return profiles[(email || "").toLowerCase()] || null;
    }

    function saveLoggedInUser(userData) {
      localStorage.setItem("loggedInUser", JSON.stringify(userData));
    }

    function getRecentAccounts() {
      try {
        return JSON.parse(localStorage.getItem("recentAccounts") || "[]");
      } catch {
        return [];
      }
    }

    function saveRecentAccount(account) {
      const currentEmail = String(account?.email || "").toLowerCase();
      if (!currentEmail) return;

      const accounts = getRecentAccounts().filter(
        (item) => String(item?.email || "").toLowerCase() !== currentEmail
      );

      accounts.unshift({
        email: account.email || "",
        fullName: account.fullName || "",
        username: account.username || "",
        profileImage: account.profileImage || ""
      });

      localStorage.setItem("recentAccounts", JSON.stringify(accounts.slice(0, 10)));
    }

    function removeRecentAccount(email) {
      const safeEmail = String(email || "").toLowerCase();

      const updated = getRecentAccounts().filter(
        (item) => String(item.email || "").toLowerCase() !== safeEmail
      );

      localStorage.setItem("recentAccounts", JSON.stringify(updated));

      const loginInput = document.getElementById("loginUser");
      if (loginInput && String(loginInput.value || "").toLowerCase() === safeEmail) {
        loginInput.value = "";
      }

      renderRecentAccounts();
    }

    function renderRecentAccounts() {
      const wrap = document.getElementById("recentAccounts");
      if (!wrap) return;

      const accounts = getRecentAccounts();

      if (!accounts.length) {
        wrap.innerHTML = "";
        return;
      }

      wrap.innerHTML = `
        <div class="recent-accounts-box">
          <h3>Saved Accounts</h3>
          ${accounts.map((acc) => `
            <div class="recent-account-item" data-email="${escapeHtml(acc.email || "")}">
              <div class="recent-account-left recent-account-select">
                <div class="recent-account-avatar">
                  ${
                    acc.profileImage
                      ? `<img src="${escapeHtml(acc.profileImage)}" alt="User" />`
                      : `<span>👤</span>`
                  }
                </div>

                <div class="recent-account-content">
                  <div class="recent-account-name">${escapeHtml(acc.fullName || acc.username || acc.email)}</div>
                  <div class="recent-account-email">${escapeHtml(acc.email || "")}</div>
                </div>
              </div>

              <button
                type="button"
                class="recent-account-delete"
                data-email="${escapeHtml(acc.email || "")}"
                title="Delete account"
              >
                ✕
              </button>
            </div>
          `).join("")}
        </div>
      `;

      wrap.querySelectorAll(".recent-account-select").forEach((node) => {
        node.addEventListener("click", function () {
          const parent = this.closest(".recent-account-item");
          const email = parent?.getAttribute("data-email") || "";
          window.selectAccount(email);
        });
      });

      wrap.querySelectorAll(".recent-account-delete").forEach((btn) => {
        btn.addEventListener("click", function (event) {
          event.stopPropagation();

          const email = this.getAttribute("data-email") || "";
          const ok = confirm("এই saved account delete করবেন?");
          if (!ok) return;

          removeRecentAccount(email);
        });
      });
    }

    window.selectAccount = function (email) {
      document.getElementById("loginUser").value = email || "";
      document.getElementById("loginPassword").focus();
      showLogin();
    };

    window.showSignup = function () {
      document.getElementById("loginForm").classList.remove("active-form");
      document.getElementById("signupForm").classList.add("active-form");
    };

    window.showLogin = function () {
      document.getElementById("signupForm").classList.remove("active-form");
      document.getElementById("loginForm").classList.add("active-form");
    };

    window.togglePassword = function () {
      const input = document.getElementById("loginPassword");
      input.type = input.type === "password" ? "text" : "password";
    };

    window.toggleSignupPassword = function () {
      const input = document.getElementById("signupPassword");
      input.type = input.type === "password" ? "text" : "password";
    };

    window.forgotPasswordInfo = function () {
      alert("পাসওয়ার্ড রিসেট ফিচার পরে যোগ করা যাবে। আপাতত Supabase reset system ব্যবহার করতে হবে।");
    };

    window.signupUser = async function () {
      const firstname = document.getElementById("firstname").value.trim();
      const lastname = document.getElementById("lastname").value.trim();
      const email = document.getElementById("email").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      if (!firstname || !lastname || !email || !username || !password) {
        alert("সব ঘর পূরণ করুন");
        return;
      }

      if (!emailValid(email)) {
        alert("সঠিক Email দিন");
        return;
      }

      if (password.length < 6) {
        alert("Password কমপক্ষে 6 অক্ষরের হতে হবে");
        return;
      }

      const { error } = await signUpUser(email, password);

      if (error) {
        alert(error.message || "Account create failed");
        return;
      }

      saveProfile(email, {
        firstname,
        lastname,
        fullName: firstname + " " + lastname,
        email,
        username,
        profileImage: "",
        createdAt: new Date().toISOString()
      });

      localStorage.removeItem("loggedInUser");
      await signOutUser();

      document.getElementById("loginUser").value = email;
      document.getElementById("loginPassword").value = "";

      document.getElementById("firstname").value = "";
      document.getElementById("lastname").value = "";
      document.getElementById("email").value = "";
      document.getElementById("username").value = "";
      document.getElementById("signupPassword").value = "";

      sessionStorage.setItem("lastLoginEmail", email);

      alert("Account Created Successfully. এখন Login করুন");
      showLogin();
      renderRecentAccounts();
    };

    window.loginUser = async function () {
      const userInput = document.getElementById("loginUser").value.trim();
      const pass = document.getElementById("loginPassword").value.trim();

      if (!userInput || !pass) {
        alert("Email এবং Password দিন");
        return;
      }

      const { data, error } = await signInUser(userInput, pass);

      if (error) {
        alert(error.message || "Login failed");
        return;
      }

      const user = data?.user || null;

      if (!user) {
        alert("Login failed");
        return;
      }

      const email = (user.email || userInput).toLowerCase();
      const savedProfile = getProfile(email);

      const finalUser = {
        email: user.email || userInput,
        fullName: savedProfile?.fullName || "",
        firstname: savedProfile?.firstname || "",
        lastname: savedProfile?.lastname || "",
        username: savedProfile?.username || "",
        profileImage: savedProfile?.profileImage || "",
        createdAt: savedProfile?.createdAt || new Date().toISOString()
      };

      saveLoggedInUser(finalUser);
      saveRecentAccount(finalUser);

      sessionStorage.removeItem("lastLoginEmail");

      alert("Login Success");
      window.location.replace("dashboard.html");
    };

    window.logoutUser = async function () {
      await signOutUser();
      localStorage.removeItem("loggedInUser");
      window.location.replace("login.html");
    };

    document.addEventListener("DOMContentLoaded", function () {
      const lastEmail = sessionStorage.getItem("lastLoginEmail");
      const loginInput = document.getElementById("loginUser");

      if (lastEmail && loginInput) {
        loginInput.value = lastEmail;
      }

      renderRecentAccounts();
    });

    (async function () {
      const { user } = await getCurrentUser();

      if (user) {
        const email = (user.email || "").toLowerCase();
        const savedProfile = getProfile(email);

        const finalUser = {
          email: user.email || "",
          fullName: savedProfile?.fullName || "",
          firstname: savedProfile?.firstname || "",
          lastname: savedProfile?.lastname || "",
          username: savedProfile?.username || "",
          profileImage: savedProfile?.profileImage || "",
          createdAt: savedProfile?.createdAt || new Date().toISOString()
        };

        saveLoggedInUser(finalUser);
        saveRecentAccount(finalUser);

        window.location.replace("dashboard.html");
      }
    })();
  </script>

</body>
</html>
